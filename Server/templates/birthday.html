<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Happy Birthday!</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: #fff;
        color: #333;
        margin: 0;
        padding: 0;
      }
      .wrap {
        max-width: 600px;
        margin: 24px auto;
        padding: 24px;
        border-radius: 8px;
        background: linear-gradient(180deg, #fff, #f9f9ff);
      }
      .hero {
        text-align: center;
      }
      .btn {
        display: inline-block;
        padding: 12px 20px;
        background: #2d7d9a;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
      }
      .footer {
        font-size: 12px;
        color: #888;
        text-align: center;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1 style="margin: 0">Happy Birthday, {{name}}!</h1>
        <p style="margin: 8px 0 18px">
          Wishing you a wonderful day full of joy and celebration.
        </p>
        <img
          src="https://unsplash.com/photos/happy-birthday-sign-kmLUcvhqhSo"
          alt="Birthday"
          style="
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 6px;
          "
        />
      </div>
      <p>
        From all of us at CelebrationHub — enjoy a special gift just for you.
      </p>
      <p style="text-align: center; margin-top: 18px">
        <a class="btn" href="{{offer_link}}">Claim your birthday offer</a>
      </p>
      <div class="footer">
        If you didn't expect this message, please ignore it.
      </div>
    </div>
  </body>
</html>
